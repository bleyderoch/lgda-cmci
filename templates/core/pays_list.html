{% extends 'base.html' %}
{% block title %}Pays – LGDA-CMCI{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2><i class="bi bi-globe me-2" style="color:var(--lgda-blue)"></i>Pays</h2>
  <a href="{% url 'core:pays_create' %}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Ajouter</a>
</div>
<div class="card"><div class="card-body p-0">
  <table class="table table-hover mb-0">
    <thead><tr><th>Nom</th><th>Code</th><th></th></tr></thead>
    <tbody>
      {% for p in pays_list %}
      <tr><td>{{ p.nom }}</td><td>{{ p.code }}</td>
      <td><a href="{% url 'core:pays_edit' p.pk %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a></td></tr>
      {% empty %}<tr><td colspan="3" class="text-center text-muted py-3">Aucun pays.</td></tr>{% endfor %}
    </tbody>
  </table>
</div></div>
{% endblock %}
