{% extends 'base.html' %}
{% block title %}Villes – LGDA-CMCI{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2><i class="bi bi-geo-alt me-2" style="color:var(--lgda-blue)"></i>Villes</h2>
  <a href="{% url 'core:ville_create' %}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Ajouter</a>
</div>
<div class="card"><div class="card-body p-0">
  <table class="table table-hover mb-0">
    <thead><tr><th>Ville</th><th>Pays</th><th></th></tr></thead>
    <tbody>
      {% for v in villes %}
      <tr><td>{{ v.nom }}</td><td>{{ v.pays }}</td>
      <td><a href="{% url 'core:ville_edit' v.pk %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a></td></tr>
      {% empty %}<tr><td colspan="3" class="text-center text-muted py-3">Aucune ville.</td></tr>{% endfor %}
    </tbody>
  </table>
</div></div>
{% endblock %}
